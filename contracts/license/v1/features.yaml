# License feature contract v1
#
# This file is the versioned agreement between the open-source app and the
# private license server. The license server CI reads this contract at the
# app tag it targets; the app gates features ONLY on entitlements listed here.
#
# Rules (see README.md):
# - Clients check entitlements, never plans.
# - Unknown entitlement => treated as not granted.
# - Removing or renaming an entitlement is a breaking change => new contract version.
contract_version: license-features-v1

features:
  - id: promptpack.pro-import
    title: Licensed Pro prompt pack import (.mgpackpro)
    description: >
      Import encrypted, publisher-signed .mgpackpro prompt packs.
      Packs declare requiredEntitlement in their manifest; when omitted the
      client falls back to this feature's entitlement.
    introduced_in: "0.1.0"
    required_entitlement: pack.import.pro
    default_enabled: false
