name: Electron Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Base SemVer version for the release
        required: true
        default: 0.1.0
        type: string
      channel:
        description: Release channel
        required: true
        default: beta
        type: choice
        options:
          - alpha
          - beta
          - latest
      prerelease_number:
        description: Numeric suffix for alpha/beta releases
        required: true
        default: "0"
        type: string

permissions:
  contents: read

concurrency:
  group: electron-release-${{ inputs.version }}-${{ inputs.channel }}-${{ inputs.prerelease_number }}
  cancel-in-progress: false

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
  HUSKY: "0"
  NODE_VERSION: "24"
  PNPM_VERSION: "11.9.0"

jobs:
  authorize-release:
    name: Authorize release ref
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require protected main or release tag
        shell: bash
        env:
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          case "$GITHUB_REF" in
            refs/heads/main|refs/tags/v*) ;;
            *)
              echo "official releases must run from main or a v* tag, got: $GITHUB_REF" >&2
              exit 1
              ;;
          esac
          if [[ "$REF_PROTECTED" != "true" ]]; then
            echo "official releases require a protected branch or tag: $GITHUB_REF" >&2
            exit 1
          fi

  release-version:
    name: Resolve release version
    needs: authorize-release
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      github_release_type: ${{ steps.version.outputs.github_release_type }}
    steps:
      - name: Resolve channel version
        id: version
        env:
          CHANNEL: ${{ inputs.channel }}
          PRERELEASE_NUMBER: ${{ inputs.prerelease_number }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must be a base SemVer value like 0.1.0" >&2
            exit 1
          fi

          case "$CHANNEL" in
            alpha|beta)
              if [[ ! "$PRERELEASE_NUMBER" =~ ^[0-9]+$ ]]; then
                echo "prerelease_number must be numeric for alpha/beta releases" >&2
                exit 1
              fi
              app_version="${VERSION}-${CHANNEL}.${PRERELEASE_NUMBER}"
              prerelease="true"
              ;;
            latest)
              app_version="$VERSION"
              prerelease="false"
              ;;
            *)
              echo "unsupported channel: $CHANNEL" >&2
              exit 1
              ;;
          esac

          {
            echo "app_version=$app_version"
            echo "prerelease=$prerelease"
            echo "github_release_type=draft"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs:
      - authorize-release
      - release-version
    runs-on: ${{ matrix.runner }}
    environment: official-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64 zip
            runner: macos-14
            platform: darwin-arm64
            electron_script: electron:release:darwin-arm64
            artifact_name: mediago-drama-macos-arm64
          - label: Windows x64 installer
            runner: windows-latest
            platform: windows-x64
            electron_script: electron:release:windows-x64
            artifact_name: mediago-drama-windows-x64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            **/go.sum

      - name: Restore vendored binary cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/vendor/dist/${{ matrix.platform }}
          key: vendor-${{ runner.os }}-${{ matrix.platform }}-${{ vars.MEDIAGO_RIGHTS_RELEASE_TAG }}-${{ hashFiles('packages/vendor/agents.json', 'packages/vendor/tools.json') }}
          restore-keys: |
            vendor-${{ runner.os }}-${{ matrix.platform }}-

      - name: Restore electron-builder cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-builder-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('pnpm-lock.yaml', 'apps/workspace/package.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-${{ matrix.platform }}-

      - name: Download private runtime assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.MEDIAGO_PRIVATE_ARTIFACT_TOKEN }}
          RIGHTS_RELEASE_TAG: ${{ vars.MEDIAGO_RIGHTS_RELEASE_TAG }}
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN:-}" || { echo "MEDIAGO_PRIVATE_ARTIFACT_TOKEN is required" >&2; exit 1; }
          test -n "${RIGHTS_RELEASE_TAG:-}" || { echo "MEDIAGO_RIGHTS_RELEASE_TAG is required" >&2; exit 1; }
          gh release download "$RIGHTS_RELEASE_TAG" \
            --repo mediago-dev/mediago-drama-private \
            --pattern mediago-rights-marketplace-tools.json \
            --pattern "mediago-rights-marketplace-${{ matrix.platform }}.zip" \
            --dir "$RUNNER_TEMP"

      - name: Verify and stage private runtime
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/stage-private-runtime.py \
            --manifest "$RUNNER_TEMP/mediago-rights-marketplace-tools.json" \
            --archive "$RUNNER_TEMP/mediago-rights-marketplace-${{ matrix.platform }}.zip" \
            --target "${{ matrix.platform }}" \
            --release-tag "${{ vars.MEDIAGO_RIGHTS_RELEASE_TAG }}" \
            --dist-root "$GITHUB_WORKSPACE/packages/vendor/dist"

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply release version
        shell: bash
        env:
          APP_VERSION: ${{ needs.release-version.outputs.app_version }}
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");

          function writeJSON(path, value) {
            writeFileSync(path, `${JSON.stringify(value, null, 2)}\n`);
          }

          const version = process.env.APP_VERSION;
          const workspacePackagePath = "apps/workspace/package.json";
          const workspacePackage = JSON.parse(readFileSync(workspacePackagePath, "utf8"));
          workspacePackage.version = version;
          writeJSON(workspacePackagePath, workspacePackage);

          const manifestPath = "one.manifest.json";
          const manifest = JSON.parse(readFileSync(manifestPath, "utf8"));
          const workspaceProject = manifest.projects?.find((project) => project.name === "workspace");
          if (workspaceProject) {
            workspaceProject.buildVersion = version;
            writeJSON(manifestPath, manifest);
          }
          NODE

      - name: Require macOS signing and notarization credentials
        if: matrix.platform == 'darwin-arm64'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MEDIAGO_MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MEDIAGO_MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.MEDIAGO_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MEDIAGO_APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MEDIAGO_APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "${CSC_LINK:-}" || { echo "MEDIAGO_MAC_CSC_LINK is required" >&2; exit 1; }
          test -n "${CSC_KEY_PASSWORD:-}" || { echo "MEDIAGO_MAC_CSC_KEY_PASSWORD is required" >&2; exit 1; }
          test -n "${APPLE_ID:-}" || { echo "MEDIAGO_APPLE_ID is required" >&2; exit 1; }
          test -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" || { echo "MEDIAGO_APPLE_APP_SPECIFIC_PASSWORD is required" >&2; exit 1; }
          test -n "${APPLE_TEAM_ID:-}" || { echo "MEDIAGO_APPLE_TEAM_ID is required" >&2; exit 1; }

      - name: Require Windows signing credentials
        if: matrix.platform == 'windows-x64'
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.MEDIAGO_WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.MEDIAGO_WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${WIN_CSC_LINK:-}" || { echo "MEDIAGO_WINDOWS_CSC_LINK is required" >&2; exit 1; }
          test -n "${WIN_CSC_KEY_PASSWORD:-}" || { echo "MEDIAGO_WINDOWS_CSC_KEY_PASSWORD is required" >&2; exit 1; }

      - name: Build signed macOS ARM64 zip
        if: matrix.platform == 'darwin-arm64'
        env:
          MEDIAGO_CODE_SIGN: "1"
          MEDIAGO_MAC_SIGN: "1"
          MEDIAGO_MAC_NOTARIZE: "1"
          CSC_LINK: ${{ secrets.MEDIAGO_MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MEDIAGO_MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.MEDIAGO_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MEDIAGO_APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MEDIAGO_APPLE_TEAM_ID }}
          MEDIAGO_INCLUDE_PROTECTED_PACK_RUNTIME: "1"
          MEDIAGO_PROMPT_PACK_POLICY: marketplace
          MEDIAGO_ELECTRON_CHANNEL: ${{ inputs.channel }}
          MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: ${{ vars.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL }}
          MEDIAGO_ELECTRON_RELEASE_TYPE: ${{ needs.release-version.outputs.github_release_type }}
          MODEL_PLATFORM: ${{ vars.MODEL_PLATFORM }}
          VITE_MEDIAGO_APIKEY_URL: ${{ vars.VITE_MEDIAGO_APIKEY_URL }}
          VITE_TALKINGDATA_APP_ID: ${{ vars.VITE_TALKINGDATA_APP_ID }}
        run: task build:electron:target PLATFORM=${{ matrix.platform }} ELECTRON_SCRIPT=${{ matrix.electron_script }}

      - name: Build signed Windows x64 installer
        if: matrix.platform == 'windows-x64'
        env:
          MEDIAGO_CODE_SIGN: "1"
          WIN_CSC_LINK: ${{ secrets.MEDIAGO_WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.MEDIAGO_WINDOWS_CSC_KEY_PASSWORD }}
          MEDIAGO_INCLUDE_PROTECTED_PACK_RUNTIME: "1"
          MEDIAGO_PROMPT_PACK_POLICY: marketplace
          MEDIAGO_ELECTRON_CHANNEL: ${{ inputs.channel }}
          MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: ${{ vars.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL }}
          MEDIAGO_ELECTRON_RELEASE_TYPE: ${{ needs.release-version.outputs.github_release_type }}
          MODEL_PLATFORM: ${{ vars.MODEL_PLATFORM }}
          VITE_MEDIAGO_APIKEY_URL: ${{ vars.VITE_MEDIAGO_APIKEY_URL }}
          VITE_TALKINGDATA_APP_ID: ${{ vars.VITE_TALKINGDATA_APP_ID }}
        run: task build:electron:target PLATFORM=${{ matrix.platform }} ELECTRON_SCRIPT=${{ matrix.electron_script }}

      - name: Upload ${{ matrix.label }} artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/workspace/release/*.blockmap
            apps/workspace/release/*.dmg
            apps/workspace/release/*.exe
            apps/workspace/release/*.yml
            apps/workspace/release/*.zip
            !apps/workspace/release/builder-debug.yml
            !apps/workspace/release/builder-effective-config.yaml
          if-no-files-found: error

  publish-release:
    name: Publish draft release
    needs:
      - release-version
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release-artifacts

      - name: Publish GitHub draft release
        shell: bash
        env:
          APP_VERSION: ${{ needs.release-version.outputs.app_version }}
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.release-version.outputs.prerelease }}
        run: |
          set -euo pipefail

          tag="v${APP_VERSION}"
          mapfile -t draft_release_ids < <(
            gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.draft and (.tag_name == \"${tag}\" or .name == \"${APP_VERSION}\")) | .id"
          )
          for release_id in "${draft_release_ids[@]}"; do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          done

          existing_tag_sha="$(git ls-remote --tags origin "refs/tags/${tag}" | awk 'NR == 1 {print $1}')"
          if [[ -n "$existing_tag_sha" ]]; then
            if [[ "$existing_tag_sha" != "$GITHUB_SHA" ]]; then
              if [[ "${#draft_release_ids[@]}" -eq 0 ]]; then
                echo "tag ${tag} already exists at ${existing_tag_sha}, expected ${GITHUB_SHA}" >&2
                exit 1
              fi
              git push origin ":refs/tags/${tag}"
              git tag -f "$tag" "$GITHUB_SHA"
              git push origin "refs/tags/${tag}"
            fi
          else
            git tag "$tag" "$GITHUB_SHA"
            git push origin "refs/tags/${tag}"
          fi

          mapfile -t files < <(
            find release-artifacts -type f \
              \( -name "*.blockmap" -o -name "*.dmg" -o -name "*.exe" -o -name "*.yml" -o -name "*.zip" \) \
              ! -name builder-debug.yml \
              ! -name builder-effective-config.yaml |
              sort
          )
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "no release artifacts found" >&2
            exit 1
          fi

          release_flags=(--repo "$GITHUB_REPOSITORY" --draft --verify-tag --title "$APP_VERSION" --notes "MediaGo Drama $APP_VERSION")
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$tag" "${files[@]}" "${release_flags[@]}"
