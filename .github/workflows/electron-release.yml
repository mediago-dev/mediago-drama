name: Electron Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Base SemVer version for the release
        required: true
        default: 0.1.0
        type: string
      channel:
        description: Release channel
        required: true
        default: beta
        type: choice
        options:
          - alpha
          - beta
          - latest
      prerelease_number:
        description: Numeric suffix for alpha/beta releases
        required: true
        default: "0"
        type: string

permissions:
  contents: write

concurrency:
  group: electron-release-${{ inputs.version }}-${{ inputs.channel }}-${{ inputs.prerelease_number }}
  cancel-in-progress: false

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
  HUSKY: "0"
  NODE_VERSION: "24"
  PNPM_VERSION: "11.9.0"

jobs:
  release-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      github_release_type: ${{ steps.version.outputs.github_release_type }}
    steps:
      - name: Resolve channel version
        id: version
        env:
          CHANNEL: ${{ inputs.channel }}
          PRERELEASE_NUMBER: ${{ inputs.prerelease_number }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must be a base SemVer value like 0.1.0" >&2
            exit 1
          fi

          case "$CHANNEL" in
            alpha|beta)
              if [[ ! "$PRERELEASE_NUMBER" =~ ^[0-9]+$ ]]; then
                echo "prerelease_number must be numeric for alpha/beta releases" >&2
                exit 1
              fi
              app_version="${VERSION}-${CHANNEL}.${PRERELEASE_NUMBER}"
              prerelease="true"
              ;;
            latest)
              app_version="$VERSION"
              prerelease="false"
              ;;
            *)
              echo "unsupported channel: $CHANNEL" >&2
              exit 1
              ;;
          esac

          {
            echo "app_version=$app_version"
            echo "prerelease=$prerelease"
            echo "github_release_type=draft"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: release-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64 zip
            # Runs on macOS so the app can be Developer ID signed + notarized when the
            # signing secrets are configured (unsigned ad-hoc build otherwise).
            runner: macos-14
            platform: darwin-arm64
            electron_script: electron:release:darwin-arm64
            artifact_name: mediago-drama-macos-arm64
          - label: Windows x64 installer
            runner: windows-latest
            platform: windows-x64
            electron_script: electron:release:windows-x64
            artifact_name: mediago-drama-windows-x64
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            **/go.sum

      - name: Restore vendored binary cache
        uses: actions/cache@v4
        with:
          path: packages/vendor/dist/${{ matrix.platform }}
          key: vendor-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('packages/vendor/agents.json', 'packages/vendor/tools.json') }}
          restore-keys: |
            vendor-${{ runner.os }}-${{ matrix.platform }}-

      - name: Restore electron-builder cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-builder-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('pnpm-lock.yaml', 'apps/workspace/package.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-${{ matrix.platform }}-

      - uses: go-task/setup-task@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply release version
        shell: bash
        env:
          APP_VERSION: ${{ needs.release-version.outputs.app_version }}
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");

          function writeJSON(path, value) {
            writeFileSync(path, `${JSON.stringify(value, null, 2)}\n`);
          }

          const version = process.env.APP_VERSION;
          const workspacePackagePath = "apps/workspace/package.json";
          const workspacePackage = JSON.parse(readFileSync(workspacePackagePath, "utf8"));
          workspacePackage.version = version;
          writeJSON(workspacePackagePath, workspacePackage);

          const manifestPath = "one.manifest.json";
          const manifest = JSON.parse(readFileSync(manifestPath, "utf8"));
          const workspaceProject = manifest.projects?.find((project) => project.name === "workspace");
          if (workspaceProject) {
            workspaceProject.buildVersion = version;
            writeJSON(manifestPath, manifest);
          }
          NODE

      - name: Enable macOS signing when secrets are configured
        if: matrix.platform == 'darwin-arm64'
        shell: bash
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
        run: |
          if [[ -n "$MACOS_CERT_P12" ]]; then
            echo "MEDIAGO_MAC_SIGN=1" >> "$GITHUB_ENV"
            echo "$MACOS_CERT_P12" | base64 -d > "$RUNNER_TEMP/mac-cert.p12"
            echo "CSC_LINK=$RUNNER_TEMP/mac-cert.p12" >> "$GITHUB_ENV"
          else
            echo "macOS signing secrets not configured â€” building unsigned"
          fi

      - name: Build ${{ matrix.label }}
        env:
          MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: ${{ vars.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL }}
          MEDIAGO_ELECTRON_RELEASE_TYPE: ${{ needs.release-version.outputs.github_release_type }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MODEL_PLATFORM: ${{ vars.MODEL_PLATFORM }}
          VITE_MEDIAGO_APIKEY_URL: ${{ vars.VITE_MEDIAGO_APIKEY_URL }}
          VITE_TALKINGDATA_APP_ID: ${{ vars.VITE_TALKINGDATA_APP_ID }}
        run: task build:electron:target PLATFORM=${{ matrix.platform }} ELECTRON_SCRIPT=${{ matrix.electron_script }}

      - name: Upload ${{ matrix.label }} artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/workspace/release/*.blockmap
            apps/workspace/release/*.dmg
            apps/workspace/release/*.exe
            apps/workspace/release/*.yml
            apps/workspace/release/*.zip
            !apps/workspace/release/builder-debug.yml
            !apps/workspace/release/builder-effective-config.yaml
          if-no-files-found: error

  publish-release:
    name: Publish draft release
    needs:
      - release-version
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Publish GitHub draft release
        shell: bash
        env:
          APP_VERSION: ${{ needs.release-version.outputs.app_version }}
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.release-version.outputs.prerelease }}
        run: |
          set -euo pipefail

          tag="v${APP_VERSION}"
          mapfile -t draft_release_ids < <(
            gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.draft and (.tag_name == \"${tag}\" or .name == \"${APP_VERSION}\")) | .id"
          )
          for release_id in "${draft_release_ids[@]}"; do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          done

          existing_tag_sha="$(git ls-remote --tags origin "refs/tags/${tag}" | awk 'NR == 1 {print $1}')"
          if [[ -n "$existing_tag_sha" ]]; then
            if [[ "$existing_tag_sha" != "$GITHUB_SHA" ]]; then
              if [[ "${#draft_release_ids[@]}" -eq 0 ]]; then
                echo "tag ${tag} already exists at ${existing_tag_sha}, expected ${GITHUB_SHA}" >&2
                exit 1
              fi
              git push origin ":refs/tags/${tag}"
              git tag -f "$tag" "$GITHUB_SHA"
              git push origin "refs/tags/${tag}"
            fi
          else
            git tag "$tag" "$GITHUB_SHA"
            git push origin "refs/tags/${tag}"
          fi

          mapfile -t files < <(
            find release-artifacts -type f \
              \( -name "*.blockmap" -o -name "*.dmg" -o -name "*.exe" -o -name "*.yml" -o -name "*.zip" \) \
              ! -name builder-debug.yml \
              ! -name builder-effective-config.yaml |
              sort
          )
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "no release artifacts found" >&2
            exit 1
          fi

          release_flags=(--repo "$GITHUB_REPOSITORY" --draft --verify-tag --title "$APP_VERSION" --notes "MediaGo Drama $APP_VERSION")
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$tag" "${files[@]}" "${release_flags[@]}"
