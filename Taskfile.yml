version: "3"

vars:
  ROOT_DIR:
    sh: pwd
  AGENT: '{{.AGENT | default "codex"}}'
  GENERATION_CLIS: '{{.GENERATION_CLIS | default "dreamina,libtv,pippit"}}'
  MODEL_PLATFORM: '{{.MODEL_PLATFORM | default "mediago,openrouter,dmxapi"}}'
  MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: '{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL | default "http://127.0.0.1:3001/api/v1"}}'
  TOOL: '{{.TOOL | default "ffmpeg"}}'
  SERVER_PORT: '{{.SERVER_PORT | default "48273"}}'
  DEV_SERVER_PORT: '{{.DEV_SERVER_PORT | default "8080"}}'
  DEV_SERVER_URL: "http://127.0.0.1:{{.DEV_SERVER_PORT}}"
  DEV_PROMPT_PACK_PUBLISH_URL: '{{.VITE_MEDIAGO_PROMPT_PACK_PUBLISH_URL | default "http://localhost:4321/account#promptPacks"}}'
  GOEXE:
    sh: go env GOEXE
  DEV_SERVER_BIN: '{{.DEV_SERVER_BIN | default (printf "bin/mediago-server%s" .GOEXE)}}'
  DEV_DOCUMENT_MCP_BIN: '{{.DEV_DOCUMENT_MCP_BIN | default (printf "bin/mediago-document-mcp%s" .GOEXE)}}'
  SERVER_CONFIG: services/server/configs/server.yaml
  VENDOR_BIN_DIR: "{{.ROOT_DIR}}/packages/vendor/dist"
  VENDOR_TOOL_DIR: "{{.VENDOR_BIN_DIR}}/tools"

tasks:
  check:
    cmds:
      - task: go:check
      - task: workspace:check
      - task: workspace:test
      - task: workspace:build

  test:
    cmds:
      - task: go:test
      - task: workspace:test

  build:
    env:
      MEDIAGO_AGENT_ID: "{{.AGENT}}"
      MEDIAGO_MODEL_PLATFORM: "{{.MODEL_PLATFORM}}"
      MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: "{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL}}"
      MEDIAGO_GENERATION_CLIS: "{{.GENERATION_CLIS}}"
      MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
      VITE_MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
    cmds:
      - task: prepare-agent
        vars:
          AGENT: "{{.AGENT}}"
      - task: prepare-media-tools
      - task: prepare-generation-clis
        vars:
          GENERATION_CLIS: "{{.GENERATION_CLIS}}"
      - task: workspace:build
      - task: sync:workspace-dist
      - task: build:server
      - task: stage-electron
        vars:
          AGENT: "{{.AGENT}}"
          GENERATION_CLIS: "{{.GENERATION_CLIS}}"
          MODEL_PLATFORM: "{{.MODEL_PLATFORM}}"
          MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: "{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL}}"
      - pnpm -C apps/workspace electron:build

  build:desktop:
    desc: Build the Electron desktop app
    cmds:
      - task: build:electron

  build:electron:
    desc: Build the Electron desktop app
    vars:
      ELECTRON_SCRIPT: '{{.ELECTRON_SCRIPT | default "electron:build"}}'
    env:
      MEDIAGO_AGENT_ID: "{{.AGENT}}"
      MEDIAGO_MODEL_PLATFORM: "{{.MODEL_PLATFORM}}"
      MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: "{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL}}"
      MEDIAGO_GENERATION_CLIS: "{{.GENERATION_CLIS}}"
      MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
      VITE_MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
    cmds:
      - task: prepare-agent
        vars:
          AGENT: "{{.AGENT}}"
      - task: prepare-media-tools
      - task: prepare-generation-clis
        vars:
          GENERATION_CLIS: "{{.GENERATION_CLIS}}"
      - task: workspace:build
      - task: sync:workspace-dist
      - task: build:server
      - task: stage-electron
        vars:
          AGENT: "{{.AGENT}}"
          GENERATION_CLIS: "{{.GENERATION_CLIS}}"
          MODEL_PLATFORM: "{{.MODEL_PLATFORM}}"
          MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: "{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL}}"
      - pnpm -C apps/workspace {{.ELECTRON_SCRIPT}}

  build:electron:target:
    desc: Build the Electron desktop app for one target platform
    vars:
      PLATFORM: '{{.PLATFORM | default ""}}'
      ELECTRON_SCRIPT: '{{.ELECTRON_SCRIPT | default (printf "electron:build:%s" .PLATFORM)}}'
    preconditions:
      - sh: 'case "{{.PLATFORM}}" in darwin-arm64|windows-x64) ;; *) exit 1 ;; esac'
        msg: "PLATFORM must be one of: darwin-arm64, windows-x64"
    env:
      MEDIAGO_AGENT_ID: "{{.AGENT}}"
      MEDIAGO_MODEL_PLATFORM: "{{.MODEL_PLATFORM}}"
      MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: "{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL}}"
      MEDIAGO_GENERATION_CLIS: "{{.GENERATION_CLIS}}"
      MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
      VITE_MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
    cmds:
      - task: prepare-agent
        vars:
          AGENT: "{{.AGENT}}"
          PLATFORM: "{{.PLATFORM}}"
      - task: prepare-media-tools
        vars:
          PLATFORM: "{{.PLATFORM}}"
      - task: prepare-generation-clis
        vars:
          GENERATION_CLIS: "{{.GENERATION_CLIS}}"
          PLATFORM: "{{.PLATFORM}}"
      - task: workspace:build
      - task: sync:workspace-dist
      - task: build:server:target
        vars:
          PLATFORM: "{{.PLATFORM}}"
      - task: stage-electron
        vars:
          AGENT: "{{.AGENT}}"
          PLATFORM: "{{.PLATFORM}}"
          GENERATION_CLIS: "{{.GENERATION_CLIS}}"
          MODEL_PLATFORM: "{{.MODEL_PLATFORM}}"
          MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: "{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL}}"
      - pnpm -C apps/workspace {{.ELECTRON_SCRIPT}}

  publish:electron:
    desc: Build and publish the Electron desktop app with electron-builder
    cmds:
      - task: build:electron
        vars:
          ELECTRON_SCRIPT: electron:publish

  publish:electron:target:
    desc: Build and publish the Electron desktop app for one target platform
    vars:
      PLATFORM: '{{.PLATFORM | default ""}}'
      ELECTRON_SCRIPT: '{{.ELECTRON_SCRIPT | default (printf "electron:publish:%s" .PLATFORM)}}'
    cmds:
      - task: build:electron:target
        vars:
          PLATFORM: "{{.PLATFORM}}"
          ELECTRON_SCRIPT: "{{.ELECTRON_SCRIPT}}"

  prepare-agent:
    vars:
      PLATFORM: '{{.PLATFORM | default ""}}'
    cmds:
      - task -d packages/vendor prepare AGENT="{{.AGENT}}" PLATFORM="{{.PLATFORM}}"

  prepare-tool:
    vars:
      PLATFORM: '{{.PLATFORM | default ""}}'
    cmds:
      - task -d packages/vendor prepare:tool TOOL="{{.TOOL}}" PLATFORM="{{.PLATFORM}}"

  prepare-media-tools:
    vars:
      PLATFORM: '{{.PLATFORM | default ""}}'
    cmds:
      - task -d packages/vendor prepare:media-tools PLATFORM="{{.PLATFORM}}"

  prepare-generation-clis:
    vars:
      PLATFORM: '{{.PLATFORM | default ""}}'
      GENERATION_CLIS: '{{.GENERATION_CLIS | default "dreamina"}}'
    cmds:
      - task -d packages/vendor prepare:generation-clis GENERATION_CLIS="{{.GENERATION_CLIS}}" PLATFORM="{{.PLATFORM}}"

  dev:
    desc: Run the built server binary and web workspace for browser development
    deps:
      - task: build:server
        vars:
          INCLUDE_WORKSPACE_DIST: "0"
      - task: prepare-agent
        vars:
          AGENT: "{{.AGENT}}"
      - task: prepare-media-tools
      - task: prepare-generation-clis
        vars:
          GENERATION_CLIS: "{{.GENERATION_CLIS}}"
    env:
      MEDIAGO_AGENT_ID: "{{.AGENT}}"
      MEDIAGO_MODEL_PLATFORM: "{{.MODEL_PLATFORM}}"
      MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: '{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL | default "http://127.0.0.1:3001/api/v1"}}'
      MEDIAGO_GENERATION_CLIS: "{{.GENERATION_CLIS}}"
      MEDIAGO_SERVER_PORT: "{{.DEV_SERVER_PORT}}"
      MEDIAGO_AGENT_BIN_DIR: "{{.VENDOR_BIN_DIR}}"
      MEDIAGO_FFMPEG_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      MEDIAGO_JIMENG_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      MEDIAGO_LIBTV_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      MEDIAGO_PIPPIT_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      VITE_API_PROXY_TARGET: "{{.DEV_SERVER_URL}}"
      VITE_MEDIAGO_PROMPT_PACK_PUBLISH_URL: "{{.DEV_PROMPT_PACK_PUBLISH_URL}}"
    cmds:
      - task: dev:server:check
      - task -d services/server swagger
      - |
        "{{.DEV_SERVER_BIN}}" --config "{{.SERVER_CONFIG}}" &
        SERVER_PID=$!
        trap 'kill "$SERVER_PID" 2>/dev/null' EXIT
        pnpm -C apps/workspace dev

  dev:desktop:
    desc: Run the Electron desktop app against an external dev server
    env:
      VITE_API_PROXY_TARGET: "{{.DEV_SERVER_URL}}"
      VITE_MEDIAGO_SERVER_PORT: "{{.DEV_SERVER_PORT}}"
      VITE_MEDIAGO_PROMPT_PACK_PUBLISH_URL: "{{.DEV_PROMPT_PACK_PUBLISH_URL}}"
    cmds:
      - pnpm -C apps/workspace electron:dev

  dev:server:
    desc: Run only the built server binary for desktop development
    deps:
      - task: build:server
        vars:
          INCLUDE_WORKSPACE_DIST: "0"
      - task: prepare-agent
        vars:
          AGENT: "{{.AGENT}}"
      - task: prepare-media-tools
      - task: prepare-generation-clis
        vars:
          GENERATION_CLIS: "{{.GENERATION_CLIS}}"
    env:
      MEDIAGO_AGENT_ID: "{{.AGENT}}"
      MEDIAGO_MODEL_PLATFORM: "{{.MODEL_PLATFORM}}"
      MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: '{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL | default "http://127.0.0.1:3001/api/v1"}}'
      MEDIAGO_GENERATION_CLIS: "{{.GENERATION_CLIS}}"
      MEDIAGO_SERVER_PORT: "{{.DEV_SERVER_PORT}}"
      MEDIAGO_AGENT_BIN_DIR: "{{.VENDOR_BIN_DIR}}"
      MEDIAGO_FFMPEG_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      MEDIAGO_JIMENG_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      MEDIAGO_LIBTV_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      MEDIAGO_PIPPIT_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
    cmds:
      - task: dev:server:check
      - task -d services/server swagger
      - '"{{.DEV_SERVER_BIN}}" --config "{{.SERVER_CONFIG}}"'

  dev:server:check:
    internal: true
    silent: true
    cmds:
      - |
        if [ ! -s "{{.DEV_SERVER_BIN}}" ]; then
          echo "missing dev server binary: {{.DEV_SERVER_BIN}}"
          echo "run: pnpm build:server"
          exit 1
        fi
        if [ ! -s "{{.DEV_DOCUMENT_MCP_BIN}}" ]; then
          echo "missing dev document MCP binary: {{.DEV_DOCUMENT_MCP_BIN}}"
          echo "run: pnpm build:server"
          exit 1
        fi

  build:server:
    desc: Build the server-side binaries used by dev:server and dev
    vars:
      INCLUDE_WORKSPACE_DIST: '{{.INCLUDE_WORKSPACE_DIST | default "1"}}'
      SERVER_BUILD_TAGS: '{{if eq .INCLUDE_WORKSPACE_DIST "1"}}workspace_dist{{end}}'
    cmds:
      - mkdir -p bin
      - 'go build {{if .SERVER_BUILD_TAGS}}-tags "{{.SERVER_BUILD_TAGS}}"{{end}} -o "{{.DEV_SERVER_BIN}}" ./services/server/cmd/mediago-server'
      - go build -o "{{.DEV_DOCUMENT_MCP_BIN}}" ./services/server/cmd/mediago-document-mcp
      - go build -o "bin/mediago-generation-mcp{{.GOEXE}}" ./services/server/cmd/mediago-generation-mcp

  build:server:target:
    desc: Cross-build the server-side binaries for one target platform
    vars:
      PLATFORM: '{{.PLATFORM | default ""}}'
    preconditions:
      - sh: 'case "{{.PLATFORM}}" in darwin-arm64|windows-x64) ;; *) exit 1 ;; esac'
        msg: "PLATFORM must be one of: darwin-arm64, windows-x64"
    cmds:
      - node scripts/build-server-target.mjs "{{.PLATFORM}}"

  stage-electron:
    vars:
      PLATFORM: '{{.PLATFORM | default ""}}'
      MODEL_PLATFORM: '{{.MODEL_PLATFORM | default "mediago,openrouter,dmxapi"}}'
      MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL: '{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL | default ""}}'
      GENERATION_CLIS: '{{.GENERATION_CLIS | default "dreamina"}}'
    cmds:
      - node apps/workspace/scripts/stage-electron.ts "{{.AGENT}}" "{{.PLATFORM}}" "{{.MODEL_PLATFORM}}" "{{.MEDIAGO_MODEL_PLATFORM_MEDIAGO_BASE_URL}}" "{{.GENERATION_CLIS}}"

  go:check:
    cmds:
      - task -d packages/core check
      - task -d packages/mcp check
      - task -d services/server check

  go:test:
    cmds:
      - task -d packages/core test
      - task -d packages/mcp test
      - task -d services/server test

  go:build:
    cmds:
      - task -d packages/core build
      - task -d packages/mcp build
      - task -d services/server build

  workspace:check:
    cmds:
      - pnpm -C apps/workspace lint
      - pnpm -C apps/workspace format

  workspace:test:
    cmds:
      - pnpm -C apps/workspace test

  workspace:dev:
    desc: Run only the web workspace dev server
    env:
      VITE_MEDIAGO_PROMPT_PACK_PUBLISH_URL: "{{.DEV_PROMPT_PACK_PUBLISH_URL}}"
    cmds:
      - pnpm -C apps/workspace dev

  workspace:build:
    desc: Build only the web workspace
    cmds:
      - pnpm -C apps/workspace build

  sync:workspace-dist:
    cmds:
      - node scripts/sync-workspace-dist.mjs
