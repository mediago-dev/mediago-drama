version: "3"

vars:
  ROOT_DIR:
    sh: pwd
  AGENT: '{{.AGENT | default "opencode"}}'
  TOOL: '{{.TOOL | default "ffmpeg"}}'
  SERVER_PORT: '{{.SERVER_PORT | default "48273"}}'
  DEV_SERVER_PORT: '{{.DEV_SERVER_PORT | default "8080"}}'
  DEV_SERVER_URL: "http://127.0.0.1:{{.DEV_SERVER_PORT}}"
  GOEXE:
    sh: go env GOEXE
  DEV_SERVER_BIN: '{{.DEV_SERVER_BIN | default (printf "bin/mediago-server%s" .GOEXE)}}'
  DEV_DOCUMENT_MCP_BIN: '{{.DEV_DOCUMENT_MCP_BIN | default (printf "bin/mediago-document-mcp%s" .GOEXE)}}'
  SERVER_CONFIG: services/server/configs/server.yaml
  VENDOR_BIN_DIR: "{{.ROOT_DIR}}/packages/vendor/dist"
  VENDOR_TOOL_DIR: "{{.VENDOR_BIN_DIR}}/tools"

tasks:
  check:
    cmds:
      - task: go:check
      - task: workspace:check
      - task: workspace:test
      - task: workspace:build
      - task: app:check
      - task: app:test
      - task: app:build

  test:
    cmds:
      - task: go:test
      - task: workspace:test
      - task: app:test

  build:
    env:
      MEDIAGO_AGENT_ID: "{{.AGENT}}"
      MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
      VITE_MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
    cmds:
      - task: prepare-agent
        vars:
          AGENT: "{{.AGENT}}"
      - task: prepare-media-tools
      - task: workspace:build
      - task: sync:workspace-dist
      - task: build:server
      - task: stage-electron
        vars:
          AGENT: "{{.AGENT}}"
      - pnpm -C apps/workspace electron:build

  build:desktop:
    desc: Build the Electron desktop app
    cmds:
      - task: build:electron

  build:electron:
    desc: Build the Electron desktop app
    env:
      MEDIAGO_AGENT_ID: "{{.AGENT}}"
      MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
      VITE_MEDIAGO_SERVER_PORT: "{{.SERVER_PORT}}"
    cmds:
      - task: prepare-agent
        vars:
          AGENT: "{{.AGENT}}"
      - task: prepare-media-tools
      - task: workspace:build
      - task: build:server
      - task: stage-electron
        vars:
          AGENT: "{{.AGENT}}"
      - pnpm -C apps/workspace electron:build

  prepare-agent:
    cmds:
      - task -d packages/vendor prepare AGENT={{.AGENT}}

  prepare-tool:
    cmds:
      - task -d packages/vendor prepare:tool TOOL={{.TOOL}}

  prepare-media-tools:
    cmds:
      - task -d packages/vendor prepare:media-tools

  dev:
    desc: Run the built server binary and web workspace for browser development
    deps:
      - task: build:server
      - task: prepare-agent
        vars:
          AGENT: "{{.AGENT}}"
      - task: prepare-media-tools
    env:
      MEDIAGO_AGENT_ID: "{{.AGENT}}"
      MEDIAGO_SERVER_PORT: "{{.DEV_SERVER_PORT}}"
      MEDIAGO_AGENT_BIN_DIR: "{{.VENDOR_BIN_DIR}}"
      MEDIAGO_FFMPEG_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      MEDIAGO_JIMENG_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      VITE_API_PROXY_TARGET: "{{.DEV_SERVER_URL}}"
    cmds:
      - task: dev:server:check
      - task -d services/server swagger
      - |
        "{{.DEV_SERVER_BIN}}" --config "{{.SERVER_CONFIG}}" &
        SERVER_PID=$!
        trap 'kill "$SERVER_PID" 2>/dev/null' EXIT INT TERM
        pnpm -C apps/workspace dev

  dev:desktop:
    desc: Run the Electron desktop app against an external dev server
    env:
      VITE_MEDIAGO_SERVER_PORT: "{{.DEV_SERVER_PORT}}"
    cmds:
      - pnpm -C apps/workspace electron:dev

  dev:server:
    desc: Run only the built server binary for desktop development
    deps:
      - task: build:server
      - task: prepare-agent
        vars:
          AGENT: "{{.AGENT}}"
      - task: prepare-media-tools
    env:
      MEDIAGO_AGENT_ID: "{{.AGENT}}"
      MEDIAGO_SERVER_PORT: "{{.DEV_SERVER_PORT}}"
      MEDIAGO_AGENT_BIN_DIR: "{{.VENDOR_BIN_DIR}}"
      MEDIAGO_FFMPEG_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
      MEDIAGO_JIMENG_BIN_DIR: "{{.VENDOR_TOOL_DIR}}"
    cmds:
      - task: dev:server:check
      - task -d services/server swagger
      - '"{{.DEV_SERVER_BIN}}" --config "{{.SERVER_CONFIG}}"'

  dev:server:check:
    internal: true
    silent: true
    cmds:
      - |
        if [ ! -s "{{.DEV_SERVER_BIN}}" ]; then
          echo "missing dev server binary: {{.DEV_SERVER_BIN}}"
          echo "run: pnpm build:server"
          exit 1
        fi
        if [ ! -s "{{.DEV_DOCUMENT_MCP_BIN}}" ]; then
          echo "missing dev document MCP binary: {{.DEV_DOCUMENT_MCP_BIN}}"
          echo "run: pnpm build:server"
          exit 1
        fi

  build:server:
    desc: Build the server-side binaries used by dev:server and dev
    cmds:
      - mkdir -p bin
      - go build -tags workspace_dist -o "{{.DEV_SERVER_BIN}}" ./services/server/cmd/mediago-server
      - go build -o "{{.DEV_DOCUMENT_MCP_BIN}}" ./services/server/cmd/mediago-document-mcp

  stage-electron:
    cmds:
      - node apps/workspace/scripts/stage-electron.ts {{.AGENT}}

  go:check:
    cmds:
      - task -d packages/core check
      - task -d packages/mcp check
      - task -d services/server check

  go:test:
    cmds:
      - task -d packages/core test
      - task -d packages/mcp test
      - task -d services/server test

  go:build:
    cmds:
      - task -d packages/core build
      - task -d packages/mcp build
      - task -d services/server build

  workspace:check:
    cmds:
      - pnpm -C apps/workspace lint
      - pnpm -C apps/workspace format

  workspace:test:
    cmds:
      - pnpm -C apps/workspace test

  workspace:dev:
    desc: Run only the web workspace dev server
    cmds:
      - pnpm -C apps/workspace dev

  workspace:build:
    desc: Build only the web workspace
    cmds:
      - pnpm -C apps/workspace build

  app:check:
    cmds:
      - pnpm -C apps/app lint

  app:test:
    cmds:
      - pnpm -C apps/app exec vitest run

  app:build:
    cmds:
      - pnpm -C apps/app build

  sync:workspace-dist:
    cmds:
      - rm -rf services/server/internal/workspace/dist
      - mkdir -p services/server/internal/workspace/dist
      - cp -R apps/workspace/dist/. services/server/internal/workspace/dist
